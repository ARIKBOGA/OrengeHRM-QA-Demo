name: CI — Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install wait-on
        run: npm install -g wait-on

      - name: Start OrangeHRM via Docker
        run: |
          docker compose -f docker/docker-compose.yml up -d
          wait-on http://localhost:8080 --timeout 240000

      - name: Run smoke tests — staging
        env:
          ENV:              staging
          BASE_URL:         https://opensource-demo.orangehrmlive.com
          API_BASE_URL:     https://opensource-demo.orangehrmlive.com/web/index.php/api/v2
          DB_ENABLED:       false
          ADMIN_USERNAME:   ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD:   ${{ secrets.ADMIN_PASSWORD }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
          GH_OWNER:         ${{ secrets.GH_OWNER }}
          GH_REPO:          ${{ secrets.GH_REPO }}
          OAUTH_CLIENT_ID:  ${{ secrets.OAUTH_CLIENT_ID }}
        run: npm run test:smoke

      - name: Run all tests — local Docker
        env:
          ENV:              local
          BASE_URL:         http://localhost:8080
          API_BASE_URL:     http://localhost:8080/web/index.php/api/v2
          DB_ENABLED:       true
          DB_HOST:          127.0.0.1
          DB_PORT:          3306
          DB_NAME:          orangehrm
          DB_USER:          orangehrm
          DB_PASSWORD:      orangehrm
          ADMIN_USERNAME:   ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD:   ${{ secrets.ADMIN_PASSWORD }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
          GH_OWNER:         ${{ secrets.GH_OWNER }}
          GH_REPO:          ${{ secrets.GH_REPO }}
          OAUTH_CLIENT_ID:  ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_USERNAME:   ${{ secrets.OAUTH_USERNAME }}
          OAUTH_PASSWORD:   ${{ secrets.OAUTH_PASSWORD }}
        run: npm test

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results/

      - name: Stop Docker
        if: always()
        run: docker compose -f docker/docker-compose.yml down
